<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excel Súradnice Script</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Excel formatter</p>
          <h1>Excel Súradnice Script</h1>
        </div>
        <p class="subtitle">Formátovanie N/E súradníc a výšok bez konzoly.</p>
      </header>

      <form id="processForm" class="workspace">
        <section class="panel file-panel" aria-label="Súbory">
          <div class="section-heading">
            <span class="step">1</span>
            <div>
              <h2>Súbory</h2>
              <p>Vyber vstupný zošit a miesto uloženia výsledku.</p>
            </div>
          </div>

          <label class="field field-with-action" for="inputPath">
            <span>Vstupný Excel</span>
            <input id="inputPath" type="text" placeholder="Vyber .xlsx, .xlsm alebo .xls súbor" spellcheck="false" />
            <button id="btnInput" type="button">Prehľadávať</button>
          </label>

          <label class="field field-with-action" for="outputPath">
            <span>Výstupný Excel</span>
            <input id="outputPath" type="text" placeholder="Cesta sa predvyplní po výbere vstupu" spellcheck="false" />
            <button id="btnOutput" type="button">Uložiť ako</button>
          </label>
        </section>

        <section class="panel settings-panel" aria-label="Nastavenia spracovania">
          <div class="section-heading">
            <span class="step">2</span>
            <div>
              <h2>Nastavenie</h2>
              <p>Typ stĺpca určuje, či sa bunka formátuje ako sever, východ alebo výška.</p>
            </div>
          </div>

          <div class="settings-grid">
            <label class="field" for="sheet">
              <span>Hárok <small id="sheetMeta"></small></span>
              <select id="sheet"></select>
            </label>

            <label class="field" for="columns">
              <span>Stĺpce</span>
              <input id="columns" type="text" value="A-N" spellcheck="false" />
            </label>

            <label class="field" for="startRow">
              <span>Od riadku</span>
              <input id="startRow" type="number" value="1" min="1" step="1" />
            </label>

            <label class="field" for="endRow">
              <span>Do riadku</span>
              <input id="endRow" type="number" value="1" min="1" step="1" />
            </label>
          </div>
        </section>

        <section id="statusPanel" class="status-panel" data-tone="idle" aria-live="polite">
          <span class="status-dot"></span>
          <p id="status">Tip: pri výbere vstupu sa výstup nastaví automaticky.</p>
        </section>

        <div class="actions">
          <button id="btnCancel" type="button" class="secondary">Zavrieť</button>
          <button id="btnProcess" type="submit" class="primary">Spracovať</button>
        </div>
      </form>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
