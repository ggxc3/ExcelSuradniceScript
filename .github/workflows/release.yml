name: Release Windows (Tauri)

on:
  workflow_dispatch:
    inputs:
      version:
        description: SemVer release version without the v prefix
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Validate version input
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ($version -notmatch "^\d+\.\d+\.\d+$") {
            throw "Version must match SemVer core format, for example 0.1.0"
          }

      - name: Update Tauri app version
        shell: pwsh
        run: |
          $path = "src-tauri/tauri.conf.json"
          $json = Get-Content $path -Raw | ConvertFrom-Json
          $json.version = "${{ github.event.inputs.version }}"
          $json | ConvertTo-Json -Depth 100 | Set-Content $path -Encoding UTF8

      - name: Build single-file EXE
        shell: pwsh
        run: |
          cargo build --release --manifest-path src-tauri/Cargo.toml
          $version = "${{ github.event.inputs.version }}"
          $asset = "ExcelSuradniceScript-v$version-windows-amd64.exe"
          Copy-Item "src-tauri/target/release/excel-suradnice-script.exe" $asset
          "ASSET_NAME=$asset" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub release with EXE
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.event.inputs.version }}"
          $tag = "v$version"
          gh release create $tag $env:ASSET_NAME `
            --title "Excel Suradnice Script $tag" `
            --target $env:GITHUB_SHA `
            --notes "Single-file EXE release for Windows: $env:ASSET_NAME"
