name: Release Windows (Electron)

on:
  workflow_dispatch:
    inputs:
      version:
        description: SemVer release version without the v prefix
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate version input
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ($version -notmatch "^\d+\.\d+\.\d+$") {
            throw "Version must match SemVer core format, for example 0.1.0"
          }

      - name: Update package version
        shell: pwsh
        run: |
          npm version "${{ github.event.inputs.version }}" --no-git-tag-version

      - name: Install dependencies
        run: npm install

      - name: Build one-file EXE and portable ZIP
        shell: pwsh
        run: |
          npm run dist:win
          $version = "${{ github.event.inputs.version }}"

          $portableExe = Get-ChildItem "release" -File -Filter "*.exe" |
            Where-Object { $_.Name -match "^ExcelSuradniceScript .*\.exe$" } |
            Select-Object -First 1

          if (-not $portableExe) {
            throw "Portable EXE was not found in the release directory."
          }

          $onefileAsset = "ExcelSuradniceScript-v$version-windows-amd64-onefile.exe"
          Copy-Item $portableExe.FullName $onefileAsset

          $portableZipAsset = "ExcelSuradniceScript-v$version-windows-amd64-portable.zip"
          $builderZip = Get-ChildItem "release" -File -Filter "*.zip" | Select-Object -First 1

          if ($builderZip) {
            Copy-Item $builderZip.FullName $portableZipAsset
          }
          else {
            $stagingDir = Join-Path $env:RUNNER_TEMP "portable"
            New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null
            Copy-Item $portableExe.FullName (Join-Path $stagingDir $portableExe.Name)
            Compress-Archive -Path (Join-Path $stagingDir "*") -DestinationPath $portableZipAsset -Force
          }

          "ONEFILE_ASSET_NAME=$onefileAsset" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PORTABLE_ASSET_NAME=$portableZipAsset" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub release with one-file EXE and portable ZIP
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.event.inputs.version }}"
          $tag = "v$version"
          gh release create $tag $env:ONEFILE_ASSET_NAME $env:PORTABLE_ASSET_NAME `
            --title "Excel Suradnice Script $tag" `
            --target $env:GITHUB_SHA `
            --notes "Windows release assets:`n- One-file EXE: $env:ONEFILE_ASSET_NAME`n- Portable ZIP: $env:PORTABLE_ASSET_NAME"
