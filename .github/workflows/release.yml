name: Release Windows (Electron)

on:
  workflow_dispatch:
    inputs:
      version:
        description: SemVer release version without the v prefix
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate version input
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ($version -notmatch "^\d+\.\d+\.\d+$") {
            throw "Version must match SemVer core format, for example 0.1.0"
          }

      - name: Update package version
        shell: pwsh
        run: |
          npm version "${{ github.event.inputs.version }}" --no-git-tag-version

      - name: Install dependencies
        run: npm install

      - name: Build portable EXE
        shell: pwsh
        run: |
          npm run dist:win
          $version = "${{ github.event.inputs.version }}"
          $asset = "ExcelSuradniceScript-v$version-windows-amd64.exe"
          Copy-Item "release/ExcelSuradniceScript $version.exe" $asset
          "ASSET_NAME=$asset" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub release with EXE
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.event.inputs.version }}"
          $tag = "v$version"
          gh release create $tag $env:ASSET_NAME `
            --title "Excel Suradnice Script $tag" `
            --target $env:GITHUB_SHA `
            --notes "Portable Electron EXE release for Windows: $env:ASSET_NAME"
